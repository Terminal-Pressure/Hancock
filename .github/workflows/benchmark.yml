name: Benchmark

on:
  pull_request:
    branches: ["main", "master"]

jobs:
  benchmark:
    name: Latency regression benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run p99 benchmark tests
        run: pytest tests/benchmark_suite.py -v --tb=short -s

      - name: Print latency summary table
        run: python tests/benchmark_suite.py

                    - name: Download a Build Artifact
  uses: actions/download-artifact@v3.1.0
  with:
    # Artifact name
    name: # optional
    # Destination path
    path: # optional
          
