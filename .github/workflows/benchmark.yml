name: Benchmark

on:
  pull_request:
    branches: ["main", "master"]

jobs:
  benchmark:
    name: Latency regression benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run benchmark and performance gates
        env:
          HANCOCK_PERF_ARTIFACT: artifacts/performance-latency.json
        run: |
          mkdir -p artifacts
          pytest tests/benchmark_suite.py tests/test_performance.py \
            -v --tb=short -s \
            --junitxml=artifacts/benchmark-junit.xml

      - name: Print benchmark summary table
        if: always()
        run: |
          python tests/benchmark_suite.py | tee artifacts/benchmark-summary.txt

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: artifacts/
          if-no-files-found: error
