# ─── CIFuzz — Continuous fuzzing on pull requests (ClusterFuzzLite) ──────────
# Uses ClusterFuzzLite to build and run fuzz targets from .clusterfuzzlite/
# without requiring the project to be registered in google/oss-fuzz.
# Once hancock is accepted into OSS-Fuzz, switch to the CIFuzz actions.
name: CIFuzz

on:
  pull_request:
    branches: [main]
    paths:
      - "hancock_agent.py"
      - "hancock_constants.py"
      - "collectors/**"
      - "formatter/**"
      - "fuzz/**"
      - "requirements*.txt"
      - "orchestration_controller.py"
      - ".clusterfuzzlite/**"

permissions:
  contents: read

jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
    steps:
      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: python
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run Fuzzers
        if: steps.build.outcome == 'success'
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: code-change
          sanitizer: ${{ matrix.sanitizer }}

      - name: Upload Crash Artifacts
        uses: actions/upload-artifact@v4
        if: failure() && steps.build.outcome == 'success'
        with:
          name: cifuzz-artifacts-${{ matrix.sanitizer }}
          path: ./out/artifacts
          retention-days: 14
