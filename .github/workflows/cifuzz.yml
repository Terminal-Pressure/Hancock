# ─── CIFuzz — Continuous fuzzing on pull requests (OSS-Fuzz integration) ─────
# Uses the official google/oss-fuzz CIFuzz actions to build and run fuzz targets
# inside the same Docker environment used by OSS-Fuzz for continuous fuzzing.
name: CIFuzz

on:
  pull_request:
    branches: [main]
    paths:
      - "hancock_agent.py"
      - "hancock_constants.py"
      - "collectors/**"
      - "formatter/**"
      - "fuzz/**"
      - "requirements*.txt"
      - "orchestration_controller.py"

permissions:
  contents: read

jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - address
          - undefined
    steps:
      - name: Build Fuzzers
        id: build
        uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@master
        with:
          oss-fuzz-project-name: hancock
          language: python
          sanitizer: ${{ matrix.sanitizer }}
          dry-run: false

      - name: Run Fuzzers
        uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@master
        with:
          oss-fuzz-project-name: hancock
          language: python
          fuzz-seconds: 600
          sanitizer: ${{ matrix.sanitizer }}
          dry-run: false

      - name: Upload Crash Artifacts
        uses: actions/upload-artifact@v4
        if: failure() && steps.build.outcome == 'success'
        with:
          name: cifuzz-artifacts-${{ matrix.sanitizer }}
          path: ./out/artifacts
          retention-days: 14
