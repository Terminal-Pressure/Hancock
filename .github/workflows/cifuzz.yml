# ─── CIFuzz — Continuous fuzzing on pull requests ────────────────
# Runs fuzz targets locally for a short duration on every PR to catch
# regressions early.  Full continuous fuzzing happens on OSS-Fuzz.
name: CIFuzz

on:
  pull_request:
    branches: [main]
    paths:
      - "hancock_agent.py"
      - "collectors/**"
      - "formatter/**"
      - "fuzz/**"
      - "requirements*.txt"

permissions:
  contents: read

jobs:
  cifuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_nvd_parser
          - fuzz_mitre_parser
          - fuzz_formatter
          - fuzz_webhook_signature
          - fuzz_api_inputs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install atheris

      - name: Run fuzzer — ${{ matrix.target }}
        env:
          NVIDIA_API_KEY: "fuzz-test-key"
          HANCOCK_API_KEY: ""
        run: |
          cd fuzz
          CORPUS_NAME="${{ matrix.target }}"
          CORPUS_NAME="${CORPUS_NAME#fuzz_}"
          python "${{ matrix.target }}.py" \
            -atheris_runs=10000 \
            -max_total_time=120 \
            corpus/"${CORPUS_NAME}" \
            2>&1 | tail -50

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cifuzz-crash-${{ matrix.target }}
          path: |
            fuzz/crash-*
            fuzz/oom-*
            fuzz/timeout-*
          retention-days: 30
