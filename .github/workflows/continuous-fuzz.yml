# ─── Continuous Fuzzing — Scheduled daily runs ───────────────────
# Runs all fuzz targets for a longer duration on a daily schedule
# to catch issues that short CI runs may miss.
name: Continuous Fuzzing

on:
  schedule:
    - cron: "15 3 * * *"          # daily at 03:15 UTC
  workflow_dispatch:               # allow manual trigger

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_nvd_parser
          - fuzz_mitre_parser
          - fuzz_formatter
          - fuzz_formatter_v3
          - fuzz_webhook_signature
          - fuzz_api_inputs
          - fuzz_ghsa_parser
          - fuzz_xml_parsing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install atheris

      - name: Run fuzzer — ${{ matrix.target }} (extended)
        env:
          NVIDIA_API_KEY: "fuzz-test-key"
          HANCOCK_API_KEY: ""
        run: |
          cd fuzz
          CORPUS_NAME="${{ matrix.target }}"
          CORPUS_NAME="${CORPUS_NAME#fuzz_}"
          mkdir -p corpus/"${CORPUS_NAME}"
          python "${{ matrix.target }}.py" \
            -atheris_runs=100000 \
            -max_total_time=600 \
            corpus/"${CORPUS_NAME}" \
            2>&1 | tail -80

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            fuzz/crash-*
            fuzz/oom-*
            fuzz/timeout-*
          retention-days: 90
