apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hancock.fullname" . }}-secrets
  labels:
    {{- include "hancock.labels" . | nindent 4 }}
type: Opaque
stringData:
  HANCOCK_API_KEY: {{ .Values.secrets.hancockApiKey | quote }}
  NVIDIA_API_KEY: {{ .Values.secrets.nvidiaApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  HANCOCK_WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
  HANCOCK_SLACK_WEBHOOK: {{ .Values.secrets.slackWebhook | quote }}
  HANCOCK_TEAMS_WEBHOOK: {{ .Values.secrets.teamsWebhook | quote }}
