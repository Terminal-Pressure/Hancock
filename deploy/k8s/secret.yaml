# Secret template — substitute base64-encoded values before applying.
# Generate: echo -n "your-value" | base64
# Apply:    kubectl apply -f secret.yaml
#
# Do NOT commit real secret values to source control.
apiVersion: v1
kind: Secret
metadata:
  name: hancock-secrets
  namespace: hancock
  labels:
    app: hancock
type: Opaque
data:
  # Base64-encoded API key for the upstream LLM provider (e.g. NVIDIA NIM)
  NVIDIA_API_KEY: ""
  # Base64-encoded webhook signing secret (HMAC)
  HANCOCK_WEBHOOK_SECRET: ""
  # Base64-encoded OpenAI-compatible API key (if used)
  OPENAI_API_KEY: ""
